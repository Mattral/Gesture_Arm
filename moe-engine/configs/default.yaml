# Default training configuration for moe-engine.
# All fields are read by train.py via pkg.utils.config.load_config.

model:
  hidden_dim: 4096
  num_layers: 32
  num_experts: 64
  top_k: 2
  capacity_factor: 1.25
  ffn_dim: 14336
  vocab_size: 128256
  sequence_length: 4096
  dtype: bfloat16

training:
  global_batch_size: 4096
  micro_batch_size: 4
  learning_rate: 3.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  max_steps: 100000
  log_interval: 10
  ckpt_interval: 500
  warmup_steps: 2000

parallelism:
  # 2D mesh: (data_parallel x expert_parallel).
  # FSDP2 is applied along the "dp" axis; EP all-to-all along "ep".
  data_parallel: 8
  expert_parallel: 8
  tensor_parallel: 1            # Reserved for future TP integration.
  pipeline_parallel: 1          # Reserved for future PP integration.

checkpoint:
  local_dir: /mnt/nvme/moe-engine/ckpts
  remote_uri: s3://moe-engine-ckpts/run-001/
  async_workers: 4
  retention: 8                  # Keep last N async commits.

elastic:
  min_nodes: 8
  max_nodes: 256
  rdzv_backend: c10d
  rdzv_endpoint: etcd-headless:2379
  health_check_interval_s: 5
  drop_grace_period_s: 30

telemetry:
  log_dir: /var/log/moe-engine
  tensorboard_dir: /var/log/moe-engine/tb
  json_path: /var/log/moe-engine/step.jsonl
  mfu_target: 0.55
  hardware_peak_tflops: 989.0   # H100 SXM5 bf16 dense tensor-core peak.
